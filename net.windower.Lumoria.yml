app-id: net.windower.Lumoria
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala
command: lumoria

build-options:
  prepend-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib

finish-args:
  - --device=all
  # - --device=dri
  # for the life of me I cannot get --device=input to recognize Steam Deck Controller in Desktop mode
  # - --device=input
  - --allow=devel
  - --socket=wayland
  - --socket=fallback-x11
  - --allow=multiarch
  - --socket=pulseaudio
  - --share=network
  - --share=ipc

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/vala
  - /bin/vte-2.91-gtk4
  - /libexec/vte-urlencode-cwd
  - /share/gir-1.0
  - '*.la'
  - '*.a'

modules:

  - name: fast_float
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/fastfloat/fast_float.git
        tag: v8.2.3
        commit: 01ce95dfe46abccf3264fbccf9f5139ea9016cd2

  - name: simdutf
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/simdutf/simdutf.git
        tag: v8.0.0
        commit: 7f3757fba1b426e7f583011ba7bc4e700a8fbb1a

  - name: vte
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dglade=false
      - -Dgir=true
      - -Dvapi=true
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.82/vte-0.82.3.tar.xz
        sha256: 6dc6278f6fee30d07d1a03e2ba3335b1ea4e8d2956ceb59d861943115d930a85

  - name: libmspack
    buildsystem: autotools
    build-options:
      strip: true
    sources:
      - type: archive
        url: https://www.cabextract.org.uk/libmspack/libmspack-0.11alpha.tar.gz
        sha256: 70dd1fb2f0aecc36791b71a1e1840e62173079eadaa081192d1c323a0eeea21b

  - name: libportal
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dbackend-qt5=disabled
      - -Dbackend-qt6=disabled
    sources:
      - type: archive
        url: https://github.com/flatpak/libportal/releases/download/0.9.1/libportal-0.9.1.tar.xz
        sha256: de801ee349ed3c255a9af3c01b1a401fab5b3fc1c35eb2fd7dfb35d4b8194d7f

  - name: lumoria
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/Windower/Lumoria.git
        tag: v0.1.5
        commit: 4b932e644b1e8b901b68652f398bb028c41d78eb
        x-checker-data:
          type: git
          tag-pattern: ^v(\d+\.\d+\.\d+(?:-[0-9A-Za-z.\-]+)?)$
          version-scheme: semantic
          is-main-source: true
