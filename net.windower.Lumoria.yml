app-id: net.windower.Lumoria
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala
command: lumoria

build-options:
  prepend-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib

finish-args:
  - --device=all
  - --allow=devel
  - --socket=wayland
  - --socket=fallback-x11
  - --allow=multiarch
  - --socket=pulseaudio
  - --share=network
  - --share=ipc

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/vala
  - /lib/cmake
  - /lib/girepository-1.0
  - /libexec/vte-urlencode-cwd
  - /share/gir-1.0
  - '*.la'
  - '*.a'

modules:

  - name: fast_float
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/fastfloat/fast_float.git
        tag: v8.2.5
        commit: 05087a303dad9c98768b33c829d398223a649bc6

  - name: simdutf
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/simdutf/simdutf.git
        tag: v9.0.0
        commit: ca7acbcea967b5dcbab490066e99e3a6e6925539

  - name: vte
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dglade=false
      - -Dgir=true
      - -Dvapi=true
      - -Dapp=false
      - -Dicu=false
      - -D_systemd=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.84/vte-0.84.0.tar.xz
        sha256: 0414e31583836aeb7878da25f67c515f7e8879917ecc37c92e26b83e8d8fc3e3

  - name: libmspack
    buildsystem: autotools
    build-options:
      strip: true
    sources:
      - type: archive
        url: https://www.cabextract.org.uk/libmspack/libmspack-0.11alpha.tar.gz
        sha256: 70dd1fb2f0aecc36791b71a1e1840e62173079eadaa081192d1c323a0eeea21b

  - name: libportal
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dbackend-qt5=disabled
      - -Dbackend-qt6=disabled
    sources:
      - type: archive
        url: https://github.com/flatpak/libportal/releases/download/0.9.1/libportal-0.9.1.tar.xz
        sha256: de801ee349ed3c255a9af3c01b1a401fab5b3fc1c35eb2fd7dfb35d4b8194d7f

  - name: lumoria
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/Windower/Lumoria.git
        tag: v0.1.7
        commit: ed8256494981c28864a1489f95f642840f221d86
        x-checker-data:
          type: git
          tag-pattern: ^v(\d+\.\d+\.\d+(?:-[0-9A-Za-z.\-]+)?)$
          version-scheme: semantic
          is-main-source: true
