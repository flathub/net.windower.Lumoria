app-id: net.windower.Lumoria
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala
command: lumoria

build-options:
  prepend-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib

finish-args:
  - --device=all
  - --allow=devel
  - --socket=wayland
  - --socket=fallback-x11
  - --allow=multiarch
  - --socket=pulseaudio
  - --share=network
  - --share=ipc

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/vala
  - /share/cmake
  - /lib/cmake
  - /lib/girepository-1.0
  - /libexec/vte-urlencode-cwd
  - /share/gir-1.0
  - '*.la'
  - '*.a'

modules:

  - name: fast_float
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/fastfloat/fast_float.git
        tag: v8.2.5
        commit: 05087a303dad9c98768b33c829d398223a649bc6

  - name: simdutf
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/simdutf/simdutf.git
        tag: v9.0.0
        commit: ca7acbcea967b5dcbab490066e99e3a6e6925539

  - name: vte
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dglade=false
      - -Dgir=true
      - -Dvapi=true
      - -Dapp=false
      - -Dicu=false
      - -D_systemd=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/vte.git
        tag: 0.84.0
        commit: 5da1ed34b210f2b000ef954c147f9a1391da363b

  - name: libmspack
    buildsystem: autotools
    subdir: libmspack
    build-options:
      strip: true
    sources:
      - type: git
        url: https://github.com/kyz/libmspack.git
        tag: v1.11
        commit: 305907723a4e7ab2018e58040059ffb5e77db837

  - name: libportal
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dbackend-qt5=disabled
      - -Dbackend-qt6=disabled
    sources:
      - type: git
        url: https://github.com/flatpak/libportal.git
        tag: 0.9.1
        commit: 8f5dc8d192f6e31dafe69e35219e3b707bde71ce

  - name: libgit2
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTS=OFF
      - -DBUILD_CLI=OFF
      - -DBUILD_SHARED_LIBS=ON
      - -DUSE_SSH=OFF
      - -DREGEX_BACKEND=builtin
    sources:
      - type: git
        url: https://github.com/libgit2/libgit2.git
        tag: v1.9.2
        commit: ca225744b992bf2bf24e9a2eb357ddef78179667

  - name: libgit2-glib
    buildsystem: meson
    config-opts:
      - -Dpython=false
      - -Dvapi=true
      - -Dssh=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libgit2-glib.git
        tag: 1.2.1
        commit: 4684169522f31796e1d1daedd90aae35e89c4d86

  - name: lumoria
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/Windower/Lumoria.git
        tag: v0.1.11
        commit: 77048cc0b24fafcaf4fe3ac2c1221202299b0f2d 
        x-checker-data:
          type: git
          tag-pattern: ^v(\d+\.\d+\.\d+(?:-[0-9A-Za-z.\-]+)?)$
          version-scheme: semantic
          is-main-source: true
